name: Daily Expired Product Job

on:
  schedule:
    - cron: '00 0 * * *'  # 7:00 น. ไทย
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas gspread google-auth

      - name: Run y.py
        env:
          SPREADSHEET_ID_PRODUCTEXPIRED: ${{ secrets.SPREADSHEET_ID_PRODUCTEXPIRED}}
        run: python y.py

  

