name: Daily Noon Job

on:
  schedule:
    - cron: '35 5 * * *'  # 12:35 น. ไทย
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas gspread google-auth

      - name: Run y.py
        run: python y.py

      - name: Upload output.txt
        uses: actions/upload-artifact@v4
        with:
          name: output-file
          path: output.txt
